<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Propiedades — HÁBITAT Bienes Raíces</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{tinta:'#12161c',tintad:'#0c0f14',marino:'#1e3a4f',marinol:'#2b5570',bronce:'#b3884f',broncel:'#caa06a',niebla:'#f4f3ef',nieblad:'#e9e7df'},fontFamily:{display:['Cormorant Garamond','serif'],sans:['Inter','sans-serif']},boxShadow:{soft:'0 22px 60px -28px rgba(18,22,28,.55)'}}}}</script>
<style>body{background:#f4f3ef;color:#12161c}.lift{transition:transform .35s,box-shadow .35s}.lift:hover{transform:translateY(-6px)}</style>
</head>
<body class="font-sans antialiased">
<header class="bg-niebla/90 backdrop-blur border-b border-tinta/8 sticky top-0 z-40">
  <nav class="max-w-7xl mx-auto px-5 sm:px-8 h-[74px] flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2.5"><svg viewBox="0 0 40 40" class="w-9 h-9"><rect x="6" y="16" width="28" height="20" rx="2" fill="#1e3a4f"/><path d="M4 18L20 5l16 13" fill="none" stroke="#b3884f" stroke-width="2.4" stroke-linejoin="round"/><rect x="17" y="24" width="6" height="12" fill="#b3884f"/></svg><span class="font-display text-3xl font-700 text-tinta leading-none">HÁBITAT</span></a>
    <div class="hidden md:flex items-center gap-8 text-[15px] font-500 text-tinta/80"><a href="propiedades.html" class="text-bronce">Propiedades</a><a href="index.html#zonas" class="hover:text-bronce">Zonas</a><a href="index.html#nosotros" class="hover:text-bronce">Nosotros</a><a href="contacto.html" class="hover:text-bronce">Contacto</a></div>
    <a href="contacto.html" class="inline-flex items-center gap-2 bg-marino text-niebla text-sm font-600 px-5 py-2.5 rounded-full hover:bg-marinol transition">Agendar asesoría</a>
  </nav>
</header>

<section class="bg-marino text-niebla"><div class="max-w-7xl mx-auto px-5 sm:px-8 py-14 sm:py-20"><p class="text-bronce font-600 tracking-[.18em] text-xs uppercase mb-3">Catálogo</p><h1 class="font-display text-5xl sm:text-7xl font-600">Propiedades disponibles</h1></div></section>

<div class="max-w-7xl mx-auto px-5 sm:px-8 py-10">
  <div class="bg-white rounded-2xl shadow-soft p-2 grid grid-cols-2 md:grid-cols-5 gap-2 mb-10">
    <select id="op" class="rounded-xl px-4 py-3 text-sm bg-niebla outline-none"><option value="all">Comprar / Arrendar</option><option value="venta">Comprar</option><option value="arriendo">Arrendar</option></select>
    <select id="ti" class="rounded-xl px-4 py-3 text-sm bg-niebla outline-none"><option value="all">Tipo</option><option>Apartamento</option><option>Casa</option><option>Penthouse</option></select>
    <select id="ci" class="rounded-xl px-4 py-3 text-sm bg-niebla outline-none"><option value="all">Ciudad</option><option>Bogotá</option><option>Medellín</option><option>Cali</option></select>
    <select class="rounded-xl px-4 py-3 text-sm bg-niebla outline-none"><option>Precio</option><option>Hasta $600M</option><option>$600M–$1.200M</option><option>+$1.200M</option></select>
    <button onclick="render()" class="rounded-xl bg-bronce text-tinta font-600 text-sm hover:bg-broncel transition">Filtrar</button>
  </div>
  <div id="grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-7"></div>
</div>

<footer class="bg-tintad text-niebla/60 mt-10"><div class="max-w-7xl mx-auto px-5 sm:px-8 py-10 flex flex-col sm:flex-row items-center justify-between gap-4"><div class="flex items-center gap-2.5"><svg viewBox="0 0 40 40" class="w-8 h-8"><rect x="6" y="16" width="28" height="20" rx="2" fill="#2b5570"/><path d="M4 18L20 5l16 13" fill="none" stroke="#b3884f" stroke-width="2.4" stroke-linejoin="round"/><rect x="17" y="24" width="6" height="12" fill="#b3884f"/></svg><span class="font-display text-xl font-700 text-niebla">HÁBITAT</span></div><p class="text-xs">© 2026 HÁBITAT Bienes Raíces · Demo por condor.ai</p></div></footer>

<script>
const D=[
 {t:'Apartamento con vista al parque',z:'Chicó · Bogotá',pr:'$890.000.000',h:3,b:3,m:142,img:'prop-1.jpg',op:'venta',ti:'Apartamento',ci:'Bogotá',badge:'En venta'},
 {t:'Penthouse con terraza panorámica',z:'El Poblado · Medellín',pr:'$2.450.000.000',h:4,b:4,m:280,img:'prop-3.jpg',op:'venta',ti:'Penthouse',ci:'Medellín',badge:'Exclusivo'},
 {t:'Casa moderna con jardín y piscina',z:'Ciudad Jardín · Cali',pr:'$1.780.000.000',h:4,b:5,m:320,img:'prop-2.jpg',op:'venta',ti:'Casa',ci:'Cali',badge:'En venta'},
 {t:'Apartamento amoblado en arriendo',z:'Usaquén · Bogotá',pr:'$4.800.000/mes',h:2,b:2,m:98,img:'prop-4.jpg',op:'arriendo',ti:'Apartamento',ci:'Bogotá',badge:'Arriendo'},
 {t:'Apartaestudio de lujo',z:'Laureles · Medellín',pr:'$520.000.000',h:1,b:1,m:62,img:'fachada.jpg',op:'venta',ti:'Apartamento',ci:'Medellín',badge:'En venta'},
 {t:'Casa campestre con vista',z:'Pance · Cali',pr:'$6.500.000/mes',h:5,b:5,m:410,img:'prop-2.jpg',op:'arriendo',ti:'Casa',ci:'Cali',badge:'Arriendo'},
];
const grid=document.getElementById('grid');
function render(){const op=document.getElementById('op').value,ti=document.getElementById('ti').value,ci=document.getElementById('ci').value;
 grid.innerHTML='';const f=D.filter(x=>(op==='all'||x.op===op)&&(ti==='all'||x.ti===ti)&&(ci==='all'||x.ci===ci));
 if(!f.length){grid.innerHTML='<p class="text-tinta/50 col-span-full py-10 text-center">No hay propiedades con esos filtros. Prueba otra combinación.</p>';return}
 f.forEach(x=>grid.insertAdjacentHTML('beforeend',`<article class="lift bg-white rounded-3xl overflow-hidden shadow-soft"><a href="propiedad.html" class="block relative aspect-[4/3] overflow-hidden"><img src="${x.img}" class="w-full h-full object-cover hover:scale-105 transition duration-500"><span class="absolute top-3 left-3 ${x.badge==='Exclusivo'?'bg-tinta text-niebla':'bg-bronce text-tinta'} text-xs font-700 px-2.5 py-1 rounded-full">${x.badge}</span></a><div class="p-6"><div class="text-xs text-tinta/50 uppercase tracking-wide">${x.z}</div><h3 class="font-display text-2xl font-600 mt-1">${x.t}</h3><div class="flex gap-5 text-sm text-tinta/65 mt-3"><span>🛏 ${x.h}</span><span>🛁 ${x.b}</span><span>▢ ${x.m} m²</span></div><div class="flex items-center justify-between mt-5 pt-5 border-t border-tinta/8"><span class="font-display text-2xl font-700">${x.pr}</span><span class="text-bronce text-sm font-600">Ver →</span></div></div></article>`))}
render();
</script>
</body></html>
