<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catálogo — CUMBRE Café de Origen</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{espresso:'#241710',espressod:'#180f0a',cafe:'#6f4e37',crema:'#f7f0e5',cremad:'#efe5d4',oliva:'#46563d',terra:'#bd5d34',terral:'#d4794f',oro:'#c9a24b'},fontFamily:{serif:['Fraunces','serif'],sans:['Inter','sans-serif']},boxShadow:{soft:'0 18px 50px -22px rgba(36,23,16,.45)'}}}}</script>
<style>body{background:#f7f0e5;color:#241710}.lift{transition:transform .35s,box-shadow .35s}.lift:hover{transform:translateY(-6px)}</style>
</head>
<body class="font-sans antialiased">
<header class="bg-crema/86 backdrop-blur border-b border-espresso/8 sticky top-0 z-40">
  <nav class="max-w-7xl mx-auto px-5 sm:px-8 h-[72px] flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2.5"><svg viewBox="0 0 40 40" class="w-9 h-9"><path d="M20 4l3.6 7.6L32 13l-6 6 1.5 8.6L20 23.6 12.5 27.6 14 19l-6-6 8.4-1.4z" fill="#bd5d34"/><circle cx="20" cy="20" r="4.4" fill="#241710"/></svg><span class="font-serif text-2xl font-600 text-espresso">CUMBRE</span></a>
    <div class="hidden md:flex items-center gap-8 text-[15px] font-500 text-espresso/80"><a href="catalogo.html" class="text-terra">Catálogo</a><a href="index.html#origen" class="hover:text-terra">Nuestro origen</a><a href="index.html#suscripcion" class="hover:text-terra">Suscripción</a><a href="contacto.html" class="hover:text-terra">Contacto</a></div>
    <a href="contacto.html" class="relative w-11 h-11 grid place-items-center rounded-full border border-espresso/15 hover:border-terra hover:text-terra transition"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" class="w-5 h-5"><path d="M6 6h15l-1.5 9h-12z"/><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M6 6L5 3H3"/></svg><span class="absolute -top-1 -right-1 w-5 h-5 grid place-items-center bg-terra text-white text-[11px] font-700 rounded-full">2</span></a>
  </nav>
</header>

<section class="bg-espresso text-crema">
  <div class="max-w-7xl mx-auto px-5 sm:px-8 py-14 sm:py-20">
    <p class="text-oro font-600 tracking-[.18em] text-xs uppercase mb-3">Catálogo</p>
    <h1 class="font-serif text-4xl sm:text-6xl font-500">Nuestros cafés</h1>
    <p class="text-crema/70 mt-4 max-w-lg">Cada origen, su carácter. Filtra por perfil y encuentra el tuyo.</p>
  </div>
</section>

<div class="max-w-7xl mx-auto px-5 sm:px-8 py-12">
  <div id="filtros" class="flex flex-wrap gap-2.5 mb-10">
    <button data-f="all" class="f-on text-sm font-600 px-4 py-2 rounded-full border border-espresso/15 transition">Todos</button>
    <button data-f="suave" class="text-sm font-600 px-4 py-2 rounded-full border border-espresso/15 hover:border-terra transition">Suaves</button>
    <button data-f="intenso" class="text-sm font-600 px-4 py-2 rounded-full border border-espresso/15 hover:border-terra transition">Intensos</button>
    <button data-f="edicion" class="text-sm font-600 px-4 py-2 rounded-full border border-espresso/15 hover:border-terra transition">Ediciones limitadas</button>
  </div>
  <div id="grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-7"></div>
</div>

<footer class="bg-espressod text-crema/60 mt-10"><div class="max-w-7xl mx-auto px-5 sm:px-8 py-10 flex flex-col sm:flex-row items-center justify-between gap-4"><div class="flex items-center gap-2.5"><svg viewBox="0 0 40 40" class="w-8 h-8"><path d="M20 4l3.6 7.6L32 13l-6 6 1.5 8.6L20 23.6 12.5 27.6 14 19l-6-6 8.4-1.4z" fill="#bd5d34"/><circle cx="20" cy="20" r="4.4" fill="#f7f0e5"/></svg><span class="font-serif text-xl text-crema">CUMBRE</span></div><p class="text-xs">© 2026 CUMBRE Café de Origen · Demo por condor.ai</p></div></footer>

<script>
const P=[
 {n:'Huila Reserva',t:'Caramelo · panela · mandarina',p:'$38.900',img:'prod-1.jpg',c:'suave',tag:'Suave · Frutal',col:'oliva'},
 {n:'Nariño Volcánico',t:'Chocolate · nuez · cuerpo alto',p:'$42.500',img:'prod-2.jpg',c:'intenso',tag:'Intenso · Cacao',col:'terra'},
 {n:'Sierra Nevada Geisha',t:'Jazmín · durazno · floral',p:'$69.000',img:'prod-3.jpg',c:'edicion',tag:'Edición · Geisha',col:'oro'},
 {n:'Cauca Dulce',t:'Miel · frutos rojos · suave',p:'$39.900',img:'prod-1.jpg',c:'suave',tag:'Suave · Dulce',col:'oliva'},
 {n:'Tolima Oscuro',t:'Tostado · especias · intenso',p:'$41.000',img:'prod-2.jpg',c:'intenso',tag:'Intenso · Tostado',col:'terra'},
 {n:'Antioquia Honey',t:'Panela · vainilla · redondo',p:'$44.500',img:'prod-3.jpg',c:'edicion',tag:'Edición · Honey',col:'oro'},
];
const grid=document.getElementById('grid');
function pinta(f){grid.innerHTML='';P.filter(x=>f==='all'||x.c===f).forEach(x=>{const colMap={oliva:'text-oliva bg-oliva/10',terra:'text-terra bg-terra/10',oro:'text-oro bg-oro/15'};grid.insertAdjacentHTML('beforeend',`<article class="lift bg-white rounded-3xl overflow-hidden shadow-soft"><a href="producto.html" class="block aspect-square bg-cremad overflow-hidden"><img src="${x.img}" class="w-full h-full object-cover hover:scale-105 transition duration-500"></a><div class="p-6"><div class="flex items-center justify-between"><span class="text-xs font-600 ${colMap[x.col]} px-2.5 py-1 rounded-full">${x.tag}</span><span class="text-xs text-espresso/50">★ 4.9</span></div><h3 class="font-serif text-2xl mt-3">${x.n}</h3><p class="text-sm text-espresso/60 mt-1">${x.t}</p><div class="flex items-center justify-between mt-5"><span class="font-serif text-2xl">${x.p}</span><button class="bg-espresso text-crema text-sm font-600 px-4 py-2.5 rounded-full hover:bg-terra transition">Agregar</button></div></div></article>`)})}
pinta('all');
document.querySelectorAll('#filtros button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#filtros button').forEach(x=>{x.classList.remove('bg-espresso','text-crema','border-espresso');x.classList.add('border-espresso/15')});b.classList.add('bg-espresso','text-crema','border-espresso');pinta(b.dataset.f)});
document.querySelector('[data-f=all]').classList.add('bg-espresso','text-crema','border-espresso');
</script>
</body></html>
