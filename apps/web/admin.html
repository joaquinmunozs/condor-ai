<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · condor.ai</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="/assets/favicon.png" /><link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="/assets/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .aw{max-width:1000px;margin:0 auto;padding:110px 20px 80px}
    .topbar{position:fixed;top:0;left:0;right:0;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--linea);z-index:50}
    .topbar-in{max-width:1000px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 20px}.topbar img{height:24px}
    .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:26px}
    .kpi{background:var(--bg-2);border:1px solid var(--linea);border-radius:16px;padding:22px}
    .kpi b{font-size:1.9rem;font-weight:700;display:block;letter-spacing:-.03em}.kpi span{color:var(--tx-2);font-size:.85rem}
    .pcard{background:var(--bg-2);border:1px solid var(--linea);border-radius:18px;padding:24px;margin-bottom:22px}
    table{width:100%;border-collapse:collapse;font-size:.9rem}th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--linea)}th{color:var(--tx-2);font-weight:600;font-size:.78rem;text-transform:uppercase}
    .badge{display:inline-block;font-size:.72rem;font-weight:700;padding:4px 9px;border-radius:999px}
    .b-ok{background:rgba(10,125,79,.12);color:#0a7d4f}.b-pend{background:rgba(255,59,78,.1);color:#c0263a}.b-aldia{background:rgba(39,71,255,.1);color:var(--azul)}
    .mini{min-height:34px;padding:0 12px;font-size:.82rem;border-radius:8px}
    input,select{width:100%;border:1px solid var(--linea);border-radius:10px;padding:10px 12px;font-family:var(--sf);font-size:.92rem;margin-top:4px}
    label{font-size:.78rem;color:var(--tx-2);font-weight:600}
    .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:640px){.fgrid{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}
    /* ── Calendario ── */
    .cal-section{margin-top:32px}
    .cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .cal-mes{font-size:1rem;font-weight:700;min-width:180px;text-align:center;letter-spacing:-.02em}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
    .cal-dh{text-align:center;font-size:.7rem;font-weight:700;color:var(--tx-2);padding:6px 0;text-transform:uppercase;letter-spacing:.04em}
    .cal-dia{min-height:72px;background:var(--bg-2);border:1px solid var(--linea);border-radius:12px;padding:7px;cursor:default;transition:border-color .2s}
    .cal-dia.otro-mes{opacity:.35}
    .cal-dia.hoy{border-color:var(--azul);background:rgba(39,71,255,.04)}
    .cal-dia.tiene-eventos{cursor:pointer}.cal-dia.tiene-eventos:hover{border-color:var(--azul)}
    .cal-num{font-size:.8rem;font-weight:700;margin-bottom:4px;color:var(--tx-2)}
    .cal-dia.hoy .cal-num{color:var(--azul)}
    .cal-chip{font-size:.65rem;font-weight:600;background:var(--azul);color:#fff;border-radius:5px;padding:2px 5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
    .cal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
    .cal-overlay.open{display:flex}
    .cal-modal{background:var(--bg);border-radius:var(--r);padding:28px;width:calc(100% - 40px);max-width:500px;max-height:88vh;overflow-y:auto;box-shadow:var(--sombra)}
    .cal-modal h3{font-size:1.15rem;margin-bottom:16px}
    .cal-admins-list{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px;padding:10px;border:1px solid var(--linea);border-radius:10px;min-height:44px}
    .cal-admin-chip{font-size:.78rem;font-weight:600;padding:5px 11px;border-radius:999px;background:var(--bg-3);border:1.5px solid var(--linea);cursor:pointer;transition:all .2s;user-select:none}
    .cal-admin-chip.sel{background:var(--azul);color:#fff;border-color:var(--azul)}
    .cal-msg{font-size:.82rem;color:var(--tx-2);margin-top:8px}
    @media(max-width:640px){.cal-grid{gap:2px}.cal-dia{min-height:54px;padding:5px}.cal-chip{display:none}.cal-dia.tiene-eventos .cal-num::after{content:" •";color:var(--azul)}}
  </style>
</head>
<body>
  <div class="topbar"><div class="topbar-in"><a href="/"><img src="/assets/logo.png" alt="condor.ai" /></a><span style="font-weight:700">Panel Admin</span><button class="btn btn-soft mini" id="btnOut" style="display:none">Salir</button></div></div>

  <div class="aw">
    <div id="login" style="display:none">
      <h1 style="font-size:1.8rem;margin-bottom:8px">Acceso <span class="grad-tx">admin</span></h1>
      <p style="color:var(--tx-2);margin-bottom:18px">Solo el equipo condor.ai.</p>
      <div class="pcard" style="max-width:420px">
        <div id="step-pass">
          <label>Correo</label><input id="email" type="email" placeholder="tucorreo@gmail.com" autocomplete="email" />
          <label>Contraseña</label><input id="pass" type="password" placeholder="Tu contraseña" autocomplete="current-password" />
          <button class="btn btn-grad" style="width:100%;margin-top:14px" id="btnPass">Entrar</button>
          <p style="margin-top:12px;text-align:center"><a class="lnk" id="lnkCode" style="cursor:pointer;font-size:.85rem">Entrar con código / Olvidé mi contraseña</a></p>
        </div>
        <div id="step-code" style="display:none">
          <p style="color:var(--tx-2);font-size:.9rem">Código enviado a <b id="codeEmail"></b>:</p>
          <input id="code" type="text" inputmode="numeric" maxlength="8" placeholder="••••••••" style="letter-spacing:.35em;text-align:center;font-size:1.2rem" />
          <button class="btn btn-grad" style="width:100%;margin-top:14px" id="btnCode">Verificar</button>
          <p style="margin-top:12px;text-align:center"><a class="lnk" id="lnkBack" style="cursor:pointer;font-size:.85rem">← Volver</a></p>
        </div>
        <div id="step-newpass" style="display:none">
          <p style="color:var(--tx-2);font-size:.9rem">Crea tu contraseña (la usarás siempre):</p>
          <input id="np1" type="password" placeholder="Nueva contraseña (mín. 8)" autocomplete="new-password" />
          <input id="np2" type="password" placeholder="Repite la contraseña" autocomplete="new-password" />
          <button class="btn btn-grad" style="width:100%;margin-top:14px" id="btnNewPass">Guardar contraseña</button>
        </div>
        <p id="msg" style="color:var(--tx-2);font-size:.85rem;margin-top:12px;text-align:center"></p>
      </div>
    </div>

    <div id="panel" style="display:none">
      <h1 style="font-size:1.9rem;margin-bottom:18px">Dashboard <span class="grad-tx">condor.ai</span></h1>
      <div class="kpis" id="kpis"></div>

      <div class="pcard">
        <h3 style="font-size:1.1rem;margin-bottom:14px">➕ Nuevo cliente</h3>
        <div class="fgrid">
          <div><label>Correo del cliente</label><input id="c_email" type="email" /></div>
          <div><label>Negocio</label><input id="c_negocio" /></div>
          <div><label>Plan</label><input id="c_plan" placeholder="Esencial / Pro / Premium" /></div>
          <div><label>Concepto (qué incluye)</label><input id="c_concepto" placeholder="Landing + Videos IA" /></div>
          <div><label>Setup (monto)</label><input id="c_setup" type="number" value="0" /></div>
          <div><label>Mensual (monto)</label><input id="c_mensual" type="number" value="0" /></div>
          <div><label>Moneda</label><select id="c_moneda"><option>CLP</option><option>PEN</option><option>USD</option></select></div>
          <div><label>Web del cliente (opcional)</label><input id="c_web" placeholder="https://…" /></div>
        </div>
        <button class="btn btn-grad" style="margin-top:14px" id="btnAdd">Crear cliente</button>
        <p id="addMsg" style="color:var(--tx-2);font-size:.85rem;margin-top:10px"></p>
      </div>

      <div class="pcard">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px"><h3 style="font-size:1.1rem">👥 Clientes</h3><button class="btn btn-soft mini" id="verArch" onclick="toggleArch()">Ver archivados</button></div>
        <div style="overflow-x:auto"><table id="tabla"><thead><tr><th>Negocio</th><th>Plan</th><th>Setup</th><th>Mensual</th><th>Acciones</th></tr></thead><tbody id="filas"></tbody></table></div>
      </div>

      <!-- ── Calendario ── -->
      <div class="cal-section">
        <div class="pcard">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px">
            <h3 style="font-size:1.1rem">📅 Calendario</h3>
            <button class="btn btn-grad mini" id="btnNuevaReunion">+ Nueva reunión</button>
          </div>
          <div class="cal-nav">
            <button class="btn btn-soft mini" id="calPrev">←</button>
            <span class="cal-mes" id="calMesLabel"></span>
            <button class="btn btn-soft mini" id="calNext">→</button>
          </div>
          <div class="cal-grid" id="calGrid"></div>
        </div>
      </div>

    </div><!-- fin #panel -->
    <p id="cargando" style="color:var(--tx-2);text-align:center">Cargando…</p>
  </div>

  <!-- Modal nueva reunión -->
  <div class="cal-overlay" id="calModal">
    <div class="cal-modal">
      <h3>Nueva reunión</h3>
      <label>Título</label><input id="r_titulo" placeholder="Reunión de equipo" style="margin-bottom:8px" />
      <label>Descripción</label>
      <textarea id="r_desc" style="width:100%;border:1px solid var(--linea);border-radius:10px;padding:10px 12px;font-family:var(--sf);font-size:.92rem;margin-top:4px;margin-bottom:8px;min-height:70px;resize:vertical" placeholder="Opcional"></textarea>
      <div class="fgrid">
        <div><label>Fecha</label><input id="r_fecha" type="date" /></div>
        <div><label>Hora</label><input id="r_hora" type="time" value="09:00" /></div>
      </div>
      <label>Duración</label>
      <select id="r_dur" style="margin-bottom:8px">
        <option value="30">30 min</option>
        <option value="60" selected>1 hora</option>
        <option value="90">1.5 horas</option>
        <option value="120">2 horas</option>
      </select>
      <label>Participantes (click para seleccionar)</label>
      <div class="cal-admins-list" id="r_admins"></div>
      <div style="display:flex;gap:10px;margin-top:18px">
        <button class="btn btn-grad" id="btnGuardarReunion" style="flex:1">Guardar</button>
        <button class="btn btn-soft" id="btnCerrarModal">Cancelar</button>
      </div>
      <p class="cal-msg" id="calMsg"></p>
    </div>
  </div>

  <!-- Detalle reunión -->
  <div class="cal-overlay" id="calDetalle">
    <div class="cal-modal" style="max-width:420px">
      <h3 id="det_titulo" style="margin-bottom:8px"></h3>
      <p id="det_fecha" style="color:var(--tx-2);font-size:.9rem;margin-bottom:6px"></p>
      <p id="det_desc" style="margin-bottom:10px;white-space:pre-line"></p>
      <p id="det_creador" style="color:var(--tx-2);font-size:.82rem;margin-bottom:3px"></p>
      <p id="det_asistentes" style="color:var(--tx-2);font-size:.82rem"></p>
      <button class="btn btn-soft" id="btnCerrarDetalle" style="width:100%;margin-top:18px">Cerrar</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL="https://ogmvdthxwcmvqjlxhpsr.supabase.co";
    const ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nbXZkdGh4d2NtdnFqbHhocHNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDEwMTksImV4cCI6MjA5NzIxNzAxOX0.wo6zSUlMejjYu1hSweZcWEBBdCvBgVNWg3xtLzFTIrI";
    const sb=supabase.createClient(SUPABASE_URL,ANON_KEY);
    const FUNCTIONS=SUPABASE_URL+"/functions/v1";
    const $=id=>document.getElementById(id);
    const esc=s=>String(s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const fmt=(n,m)=> (m||"CLP")+" "+(Number(n||0)).toLocaleString();

    const show = (s) => ["step-pass","step-code","step-newpass"].forEach(x=>$(x).style.display = x===s?"block":"none");
    const reMail=/^[^@\s]+@[^@\s]+\.[^@\s]+$/;

    async function init(){
      const { data:{session} } = await sb.auth.getSession();
      $("cargando").style.display="none";
      if(!session){ $("login").style.display="block"; show("step-pass"); return; }
      await afterAuth();
    }

    async function afterAuth(){
      const { data:{ user } } = await sb.auth.getUser();
      if(!user) return;
      if(!user.user_metadata || user.user_metadata.password_set !== true){
        $("cargando").style.display="none"; $("panel").style.display="none";
        $("login").style.display="block"; show("step-newpass"); return;
      }
      const { data:adm } = await sb.rpc("es_admin");
      if(!adm){ $("login").style.display="none"; $("cargando").style.display="block"; $("cargando").innerHTML="Tu correo no es admin. <a class='lnk' href='portal.html'>Ir al portal de clientes →</a>"; return; }
      $("login").style.display="none";
      $("btnOut").style.display="inline-flex"; $("panel").style.display="block";
      cargar();
      upsertPerfil(user);
      cargarCalendario();
    }

    let verArchivados=false;
    async function cargar(){
      const { data:clientes } = await sb.from("clientes").select("*").order("creado_en",{ascending:false});
      const { data:pagos } = await sb.from("pagos").select("monto,estado,tipo");
      const activos   = (clientes||[]).filter(c=>!c.archivado);
      const archivados= (clientes||[]).filter(c=>c.archivado);
      const lista = verArchivados ? archivados : activos;
      const ingresos = (pagos||[]).filter(p=>p.estado==="pagado").reduce((s,p)=>s+(p.monto||0),0);
      const pend = activos.filter(c=>c.setup_estado!=="pagado").length;
      const morosos = activos.filter(c=>c.irresponsable).length;
      $("kpis").innerHTML=`
        <div class="kpi"><b>${activos.length}</b><span>Clientes activos</span></div>
        <div class="kpi"><b class="grad-tx">${(ingresos).toLocaleString()}</b><span>Ingresos cobrados</span></div>
        <div class="kpi"><b>${(pagos||[]).filter(p=>p.estado==='pagado').length}</b><span>Pagos confirmados</span></div>
        <div class="kpi" ${morosos?'style="border-color:#f3b0b8;background:rgba(255,59,78,.06)"':''}><b style="${morosos?'color:#c0263a':''}">${morosos}</b><span>${morosos?'⚠️ Sin pagar (alerta)':'Sin pagar'}</span></div>`;
      $("verArch").textContent = verArchivados ? `← Ver activos (${activos.length})` : `Ver archivados (${archivados.length})`;
      const badge=(e)=>{const m={pagado:["b-ok","Pagado"],al_dia:["b-aldia","Al día"],vencido:["b-pend","Vencido"],pendiente:["b-pend","Pendiente"]};const[c,t]=m[e]||["b-pend",e||"—"];return `<span class="badge ${c}">${t}</span>`;};
      $("filas").innerHTML = lista.map(c=>`
        <tr ${c.irresponsable?'style="background:rgba(255,59,78,.05)"':''}><td><b>${esc(c.negocio)||"—"}</b>${c.irresponsable?` <span class="badge b-pend" title="No ha pagado tras el cobro">⚠️ Irresponsable${c.dias_sin_pagar?` · ${c.dias_sin_pagar}d`:''}</span>`:''}<br><span style="color:var(--tx-2);font-size:.8rem">${esc(c.email)}</span></td>
        <td>${esc(c.plan)||"—"}</td>
        <td>${fmt(c.setup_monto,c.moneda)}<br>${badge(c.setup_estado)}</td>
        <td>${fmt(c.mensual_monto,c.moneda)}<br>${badge(c.mensual_estado)}</td>
        <td>${ verArchivados
          ? `<button class="btn btn-soft mini" onclick="restaurar('${c.id}')">Restaurar</button> <button class="btn mini" style="background:#ffe3e6;color:#c0263a" onclick="borrarCliente('${c.id}','${esc(c.negocio||c.email).replace(/'/g,"")}')">Borrar</button>`
          : `<button class="btn btn-soft mini" onclick="cobro('${c.id}','setup')" title="Copia el link de pago">Link setup</button> <button class="btn btn-soft mini" onclick="cobro('${c.id}','mensual')" title="Copia el link de mensualidad">Link mensual</button> <button class="btn mini" style="background:#e8edff;color:#2747ff" onclick="cobrarCorreo('${c.id}')" title="Envía el cobro por correo al cliente">📧 Enviar cobro</button> <button class="btn btn-soft mini" onclick="archivar('${c.id}')">Archivar</button>` }
        </td></tr>`).join("") || `<tr><td colspan="5" style="text-align:center;color:var(--tx-2);padding:24px">${verArchivados?"No hay clientes archivados.":"Aún no hay clientes. Crea el primero arriba."}</td></tr>`;
    }
    window.toggleArch=()=>{ verArchivados=!verArchivados; cargar(); };
    window.archivar=async(id)=>{ const {error}=await sb.from("clientes").update({archivado:true}).eq("id",id); if(error)alert("No se pudo archivar: "+error.message); else cargar(); };
    window.restaurar=async(id)=>{ const {error}=await sb.from("clientes").update({archivado:false}).eq("id",id); if(error)alert("No se pudo restaurar: "+error.message); else cargar(); };
    window.borrarCliente=async(id,nombre)=>{
      if(!confirm("¿Borrar definitivamente a "+nombre+"?\n\nEsto elimina su ficha y TODO su historial de pagos. No se puede deshacer.\n\n(Si solo quieres ocultarlo, usa Archivar.)")) return;
      const {error}=await sb.from("clientes").delete().eq("id",id);
      if(error)alert("No se pudo borrar: "+error.message); else cargar();
    };

    window.cobro=async function(id,tipo){
      const { data:{session} } = await sb.auth.getSession();
      try{
        const r=await fetch(FUNCTIONS+"/crear-pago",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+session.access_token,"apikey":ANON_KEY},body:JSON.stringify({tipo,cliente_id:id})});
        const j=await r.json();
        if(j.init_point){ await navigator.clipboard.writeText(j.init_point).catch(()=>{}); prompt("Link de cobro (cópialo y envíalo al cliente por WhatsApp):", j.init_point); }
        else alert("Error: "+(j.error||"intenta de nuevo"));
      }catch(e){ alert("Error de conexión"); }
    };

    // Envía el cobro por correo al cliente (opcional, el admin decide)
    window.cobrarCorreo=async function(id){
      const tipo = confirm("¿Qué cobro envías por correo al cliente?\n\nAceptar = Setup (pago inicial)\nCancelar = Mensualidad") ? "setup" : "mensual";
      const { data:{session} } = await sb.auth.getSession();
      try{
        const r=await fetch(FUNCTIONS+"/crear-pago",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+session.access_token,"apikey":ANON_KEY},body:JSON.stringify({tipo,cliente_id:id,enviar_correo:true})});
        const j=await r.json();
        if(j.init_point){ alert(j.correo_enviado ? "✅ Cobro enviado al correo del cliente." : "Se generó el cobro, pero el correo no se pudo enviar. Revisa que Resend esté configurado."); cargar(); }
        else alert("Error: "+(j.error||"intenta de nuevo"));
      }catch(e){ alert("Error de conexión"); }
    };

    $("btnAdd").onclick=async()=>{
      const { data:{ user } } = await sb.auth.getUser();
      const row={email:$("c_email").value.trim(),negocio:$("c_negocio").value.trim(),plan:$("c_plan").value.trim(),concepto:$("c_concepto").value.trim(),setup_monto:+$("c_setup").value||0,mensual_monto:+$("c_mensual").value||0,moneda:$("c_moneda").value,web_url:$("c_web").value.trim(),creado_por:user?.email||null};
      if(!row.email){ $("addMsg").textContent="Pon el correo del cliente."; return; }
      const { error }=await sb.from("clientes").insert(row);
      $("addMsg").textContent= error ? ("Error: "+error.message) : "✅ Cliente creado. Usa 📧 Enviar cobro para mandarle el link de pago por correo.";
      if(!error){ ["c_email","c_negocio","c_plan","c_concepto","c_web"].forEach(i=>$(i).value=""); cargar(); }
    };

    $("btnPass").onclick=async()=>{
      const email=$("email").value.trim(), password=$("pass").value;
      if(!reMail.test(email)){ $("msg").textContent="Correo inválido."; return; }
      if(!password){ $("msg").textContent="Escribe tu contraseña o usa “Entrar con código”."; return; }
      $("btnPass").disabled=true; $("msg").textContent="Entrando…";
      const { error }=await sb.auth.signInWithPassword({ email, password });
      $("btnPass").disabled=false;
      $("msg").textContent= error ? "Correo o contraseña incorrectos. Primera vez: usa “Entrar con código”." : "";
    };
    let codeCooldown=0;
    $("lnkCode").onclick=async()=>{
      const email=$("email").value.trim();
      if(!reMail.test(email)){ $("msg").textContent="Primero escribe tu correo."; return; }
      if(Date.now()<codeCooldown){ $("msg").textContent="Espera unos segundos antes de pedir otro código."; return; }
      codeCooldown=Date.now()+20000;
      $("msg").textContent="Enviando código…";
      try{
        const r=await fetch(FUNCTIONS+"/solicitar-acceso",{method:"POST",headers:{"Content-Type":"application/json","apikey":ANON_KEY,"Authorization":"Bearer "+ANON_KEY},body:JSON.stringify({email})});
        const j=await r.json();
        if(r.status===429){ $("msg").textContent=j.error||"Demasiados intentos. Espera unos minutos."; return; }
        $("codeEmail").textContent=email; $("msg").textContent="Si tu correo está registrado, te llegará un código."; show("step-code"); $("code").focus();
      }catch(e){ $("msg").textContent="Error de conexión."; }
    };
    $("lnkBack").onclick=()=>{ show("step-pass"); $("msg").textContent=""; };
    $("btnCode").onclick=async()=>{
      const email=$("email").value.trim(), token=$("code").value.trim();
      if(token.length<6){ $("msg").textContent="El código tiene 6 dígitos."; return; }
      $("btnCode").disabled=true; $("msg").textContent="Verificando…";
      const { error }=await sb.auth.verifyOtp({ email, token, type:"email" });
      $("btnCode").disabled=false;
      $("msg").textContent= error ? "Código incorrecto o vencido." : "";
    };
    $("btnNewPass").onclick=async()=>{
      const p1=$("np1").value, p2=$("np2").value;
      if(p1.length<8){ $("msg").textContent="Mínimo 8 caracteres."; return; }
      if(p1!==p2){ $("msg").textContent="Las contraseñas no coinciden."; return; }
      $("btnNewPass").disabled=true; $("msg").textContent="Guardando…";
      const { error }=await sb.auth.updateUser({ password:p1, data:{ password_set:true } });
      $("btnNewPass").disabled=false;
      if(error){ $("msg").textContent="Error: "+error.message; return; }
      $("msg").textContent=""; await afterAuth();
    };
    $("btnOut").onclick=async()=>{ await sb.auth.signOut(); location.reload(); };
    sb.auth.onAuthStateChange((_e,s)=>{ if(s) afterAuth(); });

    // ── Calendario ────────────────────────────────────────────────
    let calFecha = new Date();
    let calReuniones = [];
    let adminsList = [];
    let selectedAdmins = new Set();
    let currentUser = null;

    async function upsertPerfil(user) {
      currentUser = user;
      const nombre = (user.email || "").split("@")[0];
      await sb.from("admin_profiles").upsert({ id: user.id, email: user.email, nombre }, { onConflict: "id" });
    }

    async function cargarCalendario() {
      const año = calFecha.getFullYear();
      const mes = calFecha.getMonth();
      const desde = new Date(año, mes, 1).toISOString();
      const hasta = new Date(año, mes + 1, 0, 23, 59, 59).toISOString();

      const { data } = await sb.from("reuniones").select("*,reuniones_admins(admin_id,admin_profiles(nombre,email))")
        .gte("fecha_hora", desde).lte("fecha_hora", hasta).order("fecha_hora");
      calReuniones = data || [];
      renderCalendario(año, mes);
    }

    function renderCalendario(año, mes) {
      const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
      $("calMesLabel").textContent = `${meses[mes]} ${año}`;

      const dias = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
      const primerDia = new Date(año, mes, 1).getDay();
      const ultimoDia = new Date(año, mes + 1, 0).getDate();
      const hoy = new Date();

      let html = dias.map(d => `<div class="cal-dh">${d}</div>`).join("");

      for (let i = 0; i < primerDia; i++) {
        const d = new Date(año, mes, 0 - (primerDia - i - 1));
        html += `<div class="cal-dia otro-mes"><div class="cal-num">${d.getDate()}</div></div>`;
      }
      for (let d = 1; d <= ultimoDia; d++) {
        const esHoy = hoy.getFullYear() === año && hoy.getMonth() === mes && hoy.getDate() === d;
        const clave = `${año}-${String(mes + 1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        const eventos = calReuniones.filter(r => r.fecha_hora.slice(0, 10) === clave);
        const chips = eventos.slice(0, 2).map(r =>
          `<div class="cal-chip">${esc(r.titulo)}</div>`
        ).join("") + (eventos.length > 2 ? `<div class="cal-chip">+${eventos.length - 2} más</div>` : "");
        html += `<div class="cal-dia${esHoy ? " hoy" : ""}${eventos.length ? " tiene-eventos" : ""}" data-fecha="${clave}">
          <div class="cal-num">${d}</div>${chips}
        </div>`;
      }

      $("calGrid").innerHTML = html;

      $("calGrid").querySelectorAll(".cal-dia.tiene-eventos").forEach(el => {
        el.addEventListener("click", () => {
          const clave = el.dataset.fecha;
          const eventos = calReuniones.filter(r => r.fecha_hora.slice(0, 10) === clave);
          if (eventos.length) abrirDetalle(eventos[0]);
        });
      });
    }

    function abrirDetalle(r) {
      const dt = new Date(r.fecha_hora);
      const dur = r.duracion_min >= 60 ? `${r.duracion_min/60}h` : `${r.duracion_min} min`;
      $("det_titulo").textContent = r.titulo;
      $("det_fecha").textContent = dt.toLocaleDateString("es-CL", {weekday:"long",day:"numeric",month:"long"}) + " · " + dt.toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"}) + " (" + dur + ")";
      $("det_desc").textContent = r.descripcion || "";
      $("det_creador").textContent = "";
      const participantes = (r.reuniones_admins || []).map(a => a.admin_profiles?.nombre || a.admin_id);
      $("det_asistentes").textContent = participantes.length ? "Participantes: " + participantes.join(", ") : "";
      $("calDetalle").classList.add("open");
    }

    $("calPrev").addEventListener("click", () => {
      calFecha = new Date(calFecha.getFullYear(), calFecha.getMonth() - 1, 1);
      cargarCalendario();
    });
    $("calNext").addEventListener("click", () => {
      calFecha = new Date(calFecha.getFullYear(), calFecha.getMonth() + 1, 1);
      cargarCalendario();
    });

    $("btnNuevaReunion").addEventListener("click", async () => {
      $("calMsg").textContent = "";
      const hoy = new Date().toISOString().slice(0,10);
      $("r_fecha").value = hoy;
      $("r_titulo").value = "";
      $("r_desc").value = "";
      $("r_hora").value = "09:00";
      $("r_dur").value = "60";
      selectedAdmins = new Set();

      const { data: perfiles } = await sb.from("admin_profiles").select("id,nombre,email");
      adminsList = perfiles || [];
      $("r_admins").innerHTML = adminsList.map(a =>
        `<span class="cal-admin-chip" data-id="${a.id}">${esc(a.nombre)}</span>`
      ).join("");
      $("r_admins").querySelectorAll(".cal-admin-chip").forEach(chip => {
        chip.addEventListener("click", () => {
          const id = chip.dataset.id;
          if (selectedAdmins.has(id)) { selectedAdmins.delete(id); chip.classList.remove("sel"); }
          else { selectedAdmins.add(id); chip.classList.add("sel"); }
        });
      });
      $("calModal").classList.add("open");
    });

    $("btnGuardarReunion").addEventListener("click", async () => {
      const titulo = $("r_titulo").value.trim();
      const fecha = $("r_fecha").value;
      const hora = $("r_hora").value;
      if (!titulo) { $("calMsg").textContent = "Escribe un título."; return; }
      if (!fecha || !hora) { $("calMsg").textContent = "Pon la fecha y hora."; return; }
      $("btnGuardarReunion").disabled = true;
      $("calMsg").textContent = "Guardando…";

      const fecha_hora = new Date(`${fecha}T${hora}:00`).toISOString();
      const { data: reunion, error } = await sb.from("reuniones").insert({
        titulo,
        descripcion: $("r_desc").value.trim() || null,
        fecha_hora,
        duracion_min: +$("r_dur").value,
        creado_por: currentUser?.id,
      }).select().single();

      if (error) { $("calMsg").textContent = "Error: " + error.message; $("btnGuardarReunion").disabled = false; return; }

      // El creador también participa, para que la vea en su calendario
      const participantes = new Set(selectedAdmins);
      participantes.add(currentUser?.id);
      const inserts = [...participantes].filter(Boolean).map(admin_id => ({ reunion_id: reunion.id, admin_id }));
      if (inserts.length) await sb.from("reuniones_admins").insert(inserts);

      $("btnGuardarReunion").disabled = false;
      $("calModal").classList.remove("open");
      cargarCalendario();
    });

    $("btnCerrarModal").addEventListener("click", () => $("calModal").classList.remove("open"));
    $("btnCerrarDetalle").addEventListener("click", () => $("calDetalle").classList.remove("open"));
    $("calModal").addEventListener("click", e => { if (e.target === $("calModal")) $("calModal").classList.remove("open"); });
    $("calDetalle").addEventListener("click", e => { if (e.target === $("calDetalle")) $("calDetalle").classList.remove("open"); });
    // ── Fin Calendario ─────────────────────────────────────────────

    init();
  </script>
</body>
</html>
