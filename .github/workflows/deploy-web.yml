name: Deploy Web (condorai.cl)

# Publica apps/web en GitHub Pages en cada push a main que toque la web.
on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Una sola publicación a la vez
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Subir el sitio (apps/web)
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web
      - name: Desplegar a Pages
        id: deployment
        uses: actions/deploy-pages@v4
