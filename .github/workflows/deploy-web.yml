name: Deploy Web (condorai.cl)

# Construye apps/web-v2 (Vite) y lo publica en GitHub Pages en cada push a
# main que toque la web. La SPA usa un 404.html = index.html para que las
# rutas del cliente (react-router) funcionen al refrescar.
on:
  push:
    branches: [main]
    paths:
      - 'apps/web-v2/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Una sola publicación a la vez
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: apps/web-v2
    steps:
      - uses: actions/checkout@v4

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web-v2/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build (Vite)
        run: npm run build

      - name: Fallback SPA (404 = index)
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - name: Subir el sitio (apps/web-v2/dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web-v2/dist

      - name: Desplegar a Pages
        id: deployment
        uses: actions/deploy-pages@v4
