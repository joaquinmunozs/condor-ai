name: Analizador de campaña Meta

on:
  schedule:
    # 2 veces al día: 13:00 y 23:00 UTC (~8am y 6pm Perú)
      - cron: '0 13 * * *'
      - cron: '0 23 * * *'
  workflow_dispatch:   # botón para correrlo a mano y probar

jobs:
  analizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Analizar campañas y avisar por Telegram
        run: node meta-analyzer/meta-analyzer.mjs
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
