name: Barbara - carruseles RRSS

on:
  schedule:
    # Lun(1)/Mié(3)/Vie(5) carruseles · 09:00 Chile = 13:00 UTC (invierno UTC-4; en verano UTC-3 serían 10:00)
      - cron: '0 13 * * 1,3,5'
  workflow_dispatch:
    inputs:
      dia:
        description: 'lunes | miercoles | viernes | test  (vacío = según el día)'
        required: false
        default: ''
      retry:
        description: 'poner 1 para reintento (mejora el contenido)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  barbara:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar CLI de Higgsfield
        run: npm install -g @higgsfield/cli
      - name: Autenticar Higgsfield (descifrar credenciales rotadas)
        env:
          HF_CREDS_KEY: ${{ secrets.HF_CREDS_KEY }}
          HF_ACCESS: ${{ secrets.HIGGSFIELD_ACCESS_TOKEN }}
          HF_REFRESH: ${{ secrets.HIGGSFIELD_REFRESH_TOKEN }}
        run: |
          mkdir -p ~/.config/higgsfield
          if [ -n "$HF_CREDS_KEY" ] && [ -f services/barbara/hf-creds.enc ]; then
            echo "Usando credenciales cifradas del repo (auto-rotación)."
            openssl enc -d -aes-256-cbc -pbkdf2 -salt -in services/barbara/hf-creds.enc -out ~/.config/higgsfield/credentials.json -pass pass:"$HF_CREDS_KEY"
          else
            echo "Fallback: credenciales desde secrets sueltos."
            printf '{"access_token":"%s","refresh_token":"%s"}' "$HF_ACCESS" "$HF_REFRESH" > ~/.config/higgsfield/credentials.json
          fi
          sha256sum ~/.config/higgsfield/credentials.json | awk '{print $1}' > /tmp/hf_before.sha
      - name: Generar carrusel y enviar a Telegram
        run: node services/barbara/barbara.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DIA: ${{ github.event.inputs.dia }}
          RETRY: ${{ github.event.inputs.retry }}
      - name: Persistir credenciales rotadas + memoria
        if: always()
        env:
          HF_CREDS_KEY: ${{ secrets.HF_CREDS_KEY }}
        run: |
          git config user.name "barbara-bot"
          git config user.email "bot@condorai.cl"
          if [ -n "$HF_CREDS_KEY" ] && [ -f ~/.config/higgsfield/credentials.json ]; then
            AFTER=$(sha256sum ~/.config/higgsfield/credentials.json | awk '{print $1}')
            BEFORE=$(cat /tmp/hf_before.sha 2>/dev/null || echo "")
            if [ "$AFTER" != "$BEFORE" ]; then
              echo "Token rotado: actualizando hf-creds.enc"
              openssl enc -aes-256-cbc -pbkdf2 -salt -in ~/.config/higgsfield/credentials.json -out services/barbara/hf-creds.enc -pass pass:"$HF_CREDS_KEY"
              git add services/barbara/hf-creds.enc
            fi
          fi
          git add services/barbara/content-log.json
          if git diff --staged --quiet; then echo "sin cambios"; else
            git commit -m "barbara: registro de contenido + token $(date +%Y-%m-%d)"
            for n in 1 2 3; do git pull --rebase origin main && git push && break || sleep 5; done
          fi
